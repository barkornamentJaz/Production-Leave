<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — Bark Ornament Private Limited LMS</title>
  <style>
/* ============================================================
   BARK ORNAMENT — LEAVE MANAGEMENT SYSTEM
   style.css  |  v1.0  |  2025
   ============================================================ */

/* ── CSS Variables ── */
:root {
  --navy:        #0f2744;
  --navy-light:  #1a3a6b;
  --teal:        #0d9488;
  --teal-light:  #14b8a6;
  --gold:        #d97706;
  --red:         #dc2626;
  --red-light:   #fee2e2;
  --green:       #16a34a;
  --green-light: #dcfce7;
  --blue-light:  #eff6ff;

  --gray-50:   #f9fafb;
  --gray-100:  #f3f4f6;
  --gray-200:  #e5e7eb;
  --gray-300:  #d1d5db;
  --gray-400:  #9ca3af;
  --gray-500:  #6b7280;
  --gray-600:  #4b5563;
  --gray-700:  #374151;
  --gray-800:  #1f2937;
  --gray-900:  #111827;

  --sidebar-w: 230px;
  --header-h:  58px;
  --radius:    8px;
  --shadow:    0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.12);
  --transition: .18s ease;
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  line-height: 1.5;
  overflow-x: hidden;
}
a { color: var(--teal); text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select, textarea { font-family: inherit; }

/* ── Loading Overlay ── */
.loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(255,255,255,.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.spinner {
  width: 38px; height: 38px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ── */
.toast-container {
  position: fixed; bottom: 24px; right: 24px;
  z-index: 9998; display: flex; flex-direction: column; gap: 8px;
}
.toast {
  min-width: 260px; max-width: 380px;
  padding: 12px 18px; border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  box-shadow: var(--shadow-md);
  animation: slideIn .25s ease;
  display: flex; align-items: center; gap: 10px;
}
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } }
.toast-success { background: var(--green); color: #fff; }
.toast-error   { background: var(--red);   color: #fff; }
.toast-info    { background: var(--navy);  color: #fff; }
.toast-warning { background: var(--gold);  color: #fff; }

/* ── App Wrapper ── */
.app-wrapper {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
  transition: transform var(--transition);
}
.sidebar-logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.logo-mark { display: flex; align-items: center; gap: 10px; }
.logo-icon { font-size: 22px; }
.logo-text h2 {
  font-size: 11px; font-weight: 800; letter-spacing: .08em;
  color: #fff; text-transform: uppercase;
}
.logo-text p { font-size: 10px; color: rgba(255,255,255,.45); margin-top: 1px; }

.sidebar-nav { flex: 1; padding: 12px 8px; }
.nav-section-label {
  font-size: 9px; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; color: rgba(255,255,255,.3);
  padding: 8px 8px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 10px; border-radius: 6px;
  font-size: 13px; font-weight: 500; color: rgba(255,255,255,.7);
  cursor: pointer; position: relative;
  transition: background var(--transition), color var(--transition);
}
.nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-item.active { background: var(--teal); color: #fff; }
.nav-icon { font-size: 15px; width: 20px; text-align: center; }
.nav-badge {
  margin-left: auto; background: var(--red);
  color: #fff; font-size: 10px; font-weight: 700;
  padding: 1px 6px; border-radius: 10px;
}

.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: 10px; color: rgba(255,255,255,.3);
}

/* ── Main Content ── */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1; display: flex; flex-direction: column;
  min-height: 100vh;
}

/* ── Top Header ── */
.top-header {
  height: var(--header-h);
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  display: flex; align-items: center; gap: 12px;
  padding: 0 24px;
  position: sticky; top: 0; z-index: 50;
}
.top-header h1 {
  font-size: 16px; font-weight: 700;
  color: var(--navy); flex: 1;
}
.header-date { font-size: 12px; color: var(--gray-400); }
.header-user { display: flex; align-items: center; gap: 8px; }
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--navy); color: #fff;
  font-size: 11px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}

/* ── Page Content ── */
.page-content { padding: 22px 24px; flex: 1; }

/* ── Pages ── */
.page { display: none; }
.page.active { display: block; }

/* ── Stat Grid ── */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.stat-card {
  background: #fff; border-radius: var(--radius);
  padding: 16px; display: flex; align-items: center; gap: 14px;
  box-shadow: var(--shadow);
}
.stat-icon {
  width: 44px; height: 44px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.stat-icon.navy  { background: #e8edf5; }
.stat-icon.teal  { background: #d0faf4; }
.stat-icon.red   { background: var(--red-light); }
.stat-icon.gold  { background: #fef3c7; }
.stat-value { font-size: 22px; font-weight: 800; color: var(--navy); }
.stat-label { font-size: 12px; color: var(--gray-500); font-weight: 500; }
.stat-sub   { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

/* ── Dashboard Grid ── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  grid-auto-rows: auto;
  gap: 16px;
}
.span-2 { grid-column: span 2; }
.span-3 { grid-column: 1 / -1; }

/* ── Card ── */
.card {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); overflow: hidden;
}
.card-header {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--gray-100);
}
.card-header h3 { font-size: 13px; font-weight: 700; color: var(--navy); flex: 1; }
.card-body { padding: 14px 16px; }

/* ── On Leave List ── */
.on-leave-list { padding: 12px 16px; }
.on-leave-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--gray-100);
  font-size: 12px;
}
.on-leave-item:last-child { border-bottom: none; }
.on-leave-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 4px; background: var(--teal); color: #fff;
}

/* ── Balance Bar ── */
.balance-bar-wrap { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.balance-bar-row { display: grid; grid-template-columns: 130px 1fr 60px; align-items: center; gap: 10px; }
.balance-bar-name { font-size: 12px; font-weight: 600; color: var(--gray-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.balance-bar-track { height: 8px; background: var(--gray-100); border-radius: 4px; overflow: hidden; }
.balance-bar-fill  { height: 100%; border-radius: 4px; background: var(--teal); transition: width .4s; }
.balance-bar-fill.warn { background: var(--gold); }
.balance-bar-fill.over { background: var(--red); }
.balance-bar-label { font-size: 11px; color: var(--gray-500); text-align: right; }

/* ── Monthly Summary Table ── */
.month-summary-table { width: 100%; border-collapse: collapse; }
.month-summary-table th, .month-summary-table td {
  padding: 7px 10px; font-size: 12px;
  border-bottom: 1px solid var(--gray-100);
}
.month-summary-table th { color: var(--gray-400); font-weight: 600; text-align: left; }

/* ── Toolbar ── */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; flex-wrap: wrap; margin-bottom: 14px;
}
.toolbar-left, .toolbar-right { display: flex; align-items: center; gap: 8px; }
.search-box {
  display: flex; align-items: center; gap: 6px;
  background: #fff; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius); padding: 6px 10px;
}
.search-box input {
  border: none; outline: none;
  font-size: 13px; color: var(--gray-700);
  width: 180px; background: transparent;
}
.search-icon { font-size: 13px; color: var(--gray-400); }
.filter-select {
  background: #fff; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius); padding: 7px 10px;
  font-size: 12px; color: var(--gray-700); cursor: pointer;
  outline: none;
}
.filter-select:focus { border-color: var(--teal); }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; border: none;
  transition: background var(--transition), box-shadow var(--transition);
  white-space: nowrap;
}
.btn-primary {
  background: var(--teal); color: #fff;
}
.btn-primary:hover { background: #0b8077; box-shadow: 0 2px 8px rgba(13,148,136,.3); }
.btn-outline {
  background: #fff; color: var(--gray-700);
  border: 1.5px solid var(--gray-200);
}
.btn-outline:hover { border-color: var(--gray-400); background: var(--gray-50); }
.btn-ghost { background: transparent; color: var(--gray-500); border: none; }
.btn-ghost:hover { background: var(--gray-100); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { background: #b91c1c; }
.btn-icon { padding: 5px 8px; font-size: 16px; }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── Data Table ── */
.table-wrap { overflow-x: auto; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.data-table thead th {
  background: var(--gray-50);
  padding: 10px 12px;
  text-align: left; font-weight: 700;
  color: var(--gray-500);
  border-bottom: 1.5px solid var(--gray-200);
  white-space: nowrap;
}
.data-table tbody tr:hover { background: var(--gray-50); }
.data-table tbody tr.excess-row { background: #fff7ed; }
.data-table tbody td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--gray-100);
  color: var(--gray-700);
}
.data-table tbody tr:last-child td { border-bottom: none; }

/* ── Status Badges ── */
.badge {
  display: inline-block; padding: 2px 8px;
  border-radius: 4px; font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em;
}
.badge-green   { background: var(--green-light); color: var(--green); }
.badge-red     { background: var(--red-light);   color: var(--red); }
.badge-gold    { background: #fef3c7; color: #92400e; }
.badge-blue    { background: #dbeafe; color: #1d4ed8; }
.badge-gray    { background: var(--gray-100);    color: var(--gray-500); }
.badge-teal    { background: #d0faf4; color: var(--teal); }
.badge-excess  { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

/* ── Action buttons in table ── */
.action-btn {
  padding: 3px 8px; font-size: 11px; border-radius: 4px;
  font-weight: 600; cursor: pointer; border: 1px solid transparent;
  display: inline-flex; align-items: center; gap: 3px;
}
.action-btn-edit   { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
.action-btn-delete { background: var(--red-light); color: var(--red); border-color: #fca5a5; }
.action-btn-view   { background: #d0faf4; color: var(--teal); border-color: #99f6e4; }

/* ── Alert / Info Boxes ── */
.alert {
  padding: 10px 14px; border-radius: var(--radius);
  font-size: 12px; margin-bottom: 12px;
  display: flex; align-items: flex-start; gap: 8px;
}
.alert-warning { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; }
.alert-info    { background: var(--blue-light); border: 1px solid #bfdbfe; color: #1e40af; }
.alert-danger  { background: var(--red-light); border: 1px solid #fca5a5; color: #991b1b; }

/* ── Calendar ── */
.calendar-wrap { overflow-x: auto; padding: 8px; }
.cal-table { border-collapse: collapse; min-width: 900px; font-size: 11px; }
.cal-table th, .cal-table td {
  border: 1px solid var(--gray-200);
  padding: 5px 7px; text-align: center;
  min-width: 30px;
}
.cal-table th { background: var(--navy); color: #fff; font-weight: 700; }
.cal-table th.emp-col { background: var(--navy-light); text-align: left; min-width: 120px; }
.cal-table td.emp-name { text-align: left; font-weight: 600; color: var(--navy); background: var(--gray-50); }
.cal-table td.weekend { background: #f5f5f5; color: var(--gray-400); }
.cal-table td.holiday { background: #fef9c3; }
.cal-code {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 4px; font-size: 10px; font-weight: 700;
}
.cal-AL  { background: #dbeafe; color: #1d4ed8; }
.cal-CL  { background: #d0faf4; color: var(--teal); }
.cal-SL  { background: #fce7f3; color: #9d174d; }
.cal-HD  { background: #fef3c7; color: #92400e; }
.cal-SHL { background: #fee2e2; color: var(--red); }
.cal-H   { background: #fef9c3; color: #713f12; }
.cal-P   { color: var(--gray-400); font-size: 10px; }

/* ── Reports ── */
.report-tabs {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 16px;
}
.report-tab {
  padding: 7px 14px; border-radius: var(--radius);
  font-size: 12px; font-weight: 600; cursor: pointer;
  color: var(--gray-600); background: #fff;
  border: 1.5px solid var(--gray-200);
  transition: all var(--transition);
}
.report-tab:hover { border-color: var(--teal); color: var(--teal); }
.report-tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
.report-section { display: none; }
.report-section.active { display: block; }

/* ── Settings ── */
.settings-section {
  background: #fff; border-radius: var(--radius);
  box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden;
}
.settings-section-header {
  padding: 12px 16px;
  background: var(--gray-50); border-bottom: 1px solid var(--gray-200);
  font-size: 13px; font-weight: 700; color: var(--navy);
}
.settings-section-body { padding: 16px; }

/* ── Forms ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.form-group { margin-bottom: 14px; }
.form-group:last-child { margin-bottom: 0; }
.form-label {
  display: block; margin-bottom: 5px;
  font-size: 12px; font-weight: 600; color: var(--gray-700);
}
.form-label span { color: var(--red); margin-left: 2px; }
.form-control {
  width: 100%; padding: 8px 12px;
  border: 1.5px solid var(--gray-200); border-radius: var(--radius);
  font-size: 13px; color: var(--gray-800);
  outline: none; transition: border-color var(--transition);
  background: #fff;
}
.form-control:focus { border-color: var(--teal); }
.form-hint { font-size: 11px; color: var(--gray-400); margin-top: 4px; }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(15,39,68,.45);
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 10px;
  width: 100%; max-width: 540px; max-height: 90vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.25);
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { transform: scale(.95); opacity: 0; } }
.modal-header {
  display: flex; align-items: center; gap: 10px;
  padding: 16px 18px; border-bottom: 1px solid var(--gray-100);
}
.modal-header h3 { flex: 1; font-size: 14px; font-weight: 700; color: var(--navy); }
.modal-body { padding: 18px; overflow-y: auto; flex: 1; }
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 14px 18px; border-top: 1px solid var(--gray-100);
}

/* ── Holiday Table ── */
.hol-type-poya      { color: #6d28d9; font-weight: 700; }
.hol-type-mercantile{ color: #1d4ed8; font-weight: 700; }
.hol-type-company   { color: var(--teal); font-weight: 700; }

/* ── Dept Breakdown ── */
.dept-bar { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
.dept-bar span { font-size: 10px; padding: 1px 6px; border-radius: 3px; }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 32px 20px;
  color: var(--gray-400); font-size: 13px;
}
.empty-state .empty-icon { font-size: 32px; margin-bottom: 8px; }

/* ── Excess highlight ── */
.excess-dot {
  display: inline-block; width: 7px; height: 7px;
  background: var(--red); border-radius: 50%;
  margin-right: 5px;
}

/* ── Print styles ── */
@media print {
  .sidebar, .top-header, .toolbar, .report-tabs,
  .btn, .modal-overlay { display: none !important; }
  .main-content { margin-left: 0 !important; }
  .page-content { padding: 0 !important; }
  .card { box-shadow: none !important; }
  .data-table th { background: #eee !important; color: #000 !important; }
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .sidebar {
    transform: translateX(-100%);
  }
  .sidebar.open { transform: translateX(0); }
  .main-content { margin-left: 0; }
  .dashboard-grid { grid-template-columns: 1fr; }
  .span-2, .span-3 { grid-column: 1; }
  .form-row { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 520px) {
  .stat-grid { grid-template-columns: 1fr; }
  .toolbar { flex-direction: column; align-items: flex-start; }
}

function navigateTo(page) {

}

// Determine current page from filename
function currentPage() {
  const path = window.location.pathname.split('/').pop() || 'index.html';
  for (const [key, file] of Object.entries(PAGE_FILES)) {
    if (file === path) return key;

  return 'dashboard';
}

// Highlight active nav item

  const page = currentPage();

/* ── 3. API FUNCTIONS ─────────────────────────────────────── */

async function apiFetch(action, payload = {}) {
  if (!API_URL) {
    return demoAction(action, payload);
  }
  try {
    const res = await fetch(API_URL + '?action=' + action, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    return await res.json();
  } catch (e) {
    console.error('API Error:', e);
    throw e;
  }
}

/* ── 4. LOAD ALL DATA ─────────────────────────────────────── */

async function loadAllData() {

      apiFetch('getEmployees'),
      apiFetch('getLeaveRecords'),
      apiFetch('getHolidays'),
      apiFetch('getSettings')
    ]);
    STATE.employees    = empRes.data    || [];
    STATE.leaveRecords = leaveRes.data  || [];
    STATE.holidays     = holRes.data    || [];
    if (setRes.data) {
      STATE.settings = { ...STATE.settings, ...setRes.data };
    }
    STATE.loaded = true;
  } catch (e) {
    toast('Failed to load data. Check your API URL in js/core.js', 'error');
  } finally {
    showLoading(false);
    afterLoad();
  }
}

/* ── 6. HOLIDAY HELPERS ───────────────────────────────────── */

function isHoliday(dateStr) { return STATE.holidays.some(h => h.date === dateStr); }
function isSunday(dateStr)  { return new Date(dateStr).getDay() === 0; }
function isSaturday(dateStr){ return new Date(dateStr).getDay() === 6; }

function calcLeaveDays(startStr, endStr, leaveType) {
  if (leaveType === 'Short Leave')    return 0;
  if (leaveType === 'Half Day Leave') return 0.5;
  let days = 0;
  const start = new Date(startStr), end = new Date(endStr);
  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const ds = dateStr(d);
    if (isSunday(ds) || isHoliday(ds)) continue;
    days += isSaturday(ds) ? parseFloat(STATE.settings.satRule) : 1;
  }
  return days;
}

function dateStr(d) { return d.toISOString().split('T')[0]; }

/* ── 7. EMPLOYEE HELPERS ──────────────────────────────────── */

function getActiveEmployees() { return STATE.employees.filter(e => e.status === 'Active'); }
function getEmployee(id)       { return STATE.employees.find(e => e.id === id); }

function genEmpId() {
  if (!STATE.employees.length) return 'E001';
  const nums = STATE.employees.map(e => parseInt(e.id.replace('E','')) || 0);
  return 'E' + String(Math.max(...nums) + 1).padStart(3,'0');
}
function genLeaveId() {
  if (!STATE.leaveRecords.length) return 'L001';
  const nums = STATE.leaveRecords.map(r => parseInt(r.id.replace('L','')) || 0);
  return 'L' + String(Math.max(...nums) + 1).padStart(3,'0');
}

/* ── 8. LEAVE STATS ───────────────────────────────────────── */

function currentYear() { return new Date().getFullYear(); }

function getLeaveStats(empId) {
  const yr   = currentYear();
  const recs = STATE.leaveRecords.filter(r =>
    r.empId === empId && r.status === 'Approved' &&
    new Date(r.start).getFullYear() === yr
  );
  let al = 0, cl = 0, sl = 0, hd = 0, shl = 0;
  recs.forEach(r => {
    switch (r.type) {
      case 'Annual Leave':   al  += parseFloat(r.days||0); break;
      case 'Casual Leave':   cl  += parseFloat(r.days||0); break;
      case 'Sick Leave':     sl  += parseFloat(r.days||0); break;
      case 'Half Day Leave': hd  += 0.5; break;
      case 'Short Leave':    shl += 1;   break;
    }
  });
  const emp = getEmployee(empId);
  const entitlement = emp ? parseInt(emp.entitlement) : 0;
  return { al, cl, sl, hd, shl, entitlement, balance: Math.max(0, entitlement - al) };
}

function getShlThisMonth(empId) {
  const now = new Date();
  const ym  = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  return STATE.leaveRecords.filter(r =>
    r.empId === empId && r.type === 'Short Leave' &&
    r.status === 'Approved' && r.start.startsWith(ym)
  ).length;
}

/* ── 9. MODALS ────────────────────────────────────────────── */

function openModal(id)  { document.getElementById(id).classList.add('open'); }

/* ── 10. LOADING & TOAST ──────────────────────────────────── */

function showLoading(on) {
  const el = document.getElementById('loadingOverlay');
  if (el) el.style.display = on ? 'flex' : 'none';
}

function toast(msg, type = 'info') {
  const icons = { success:'✅', error:'❌', info:'ℹ️', warning:'⚠️' };
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span>${icons[type]||''}</span><span>${msg}</span>`;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

/* ── 11. BADGE & FILTERS ──────────────────────────────────── */

function updateExcessBadge() {
  const now   = new Date();
  const ym    = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const limit = STATE.settings.shlLimit || 1;
  const excess = new Set();
  STATE.leaveRecords.filter(r =>
    r.type === 'Short Leave' && r.status === 'Approved' && r.start.startsWith(ym)
  ).forEach(r => {
    const count = STATE.leaveRecords.filter(x =>
      x.empId === r.empId && x.type === 'Short Leave' &&
      x.status === 'Approved' && x.start.startsWith(ym)
    ).length;
    if (count > limit) excess.add(r.empId);
  });
  const badge = document.getElementById('excessBadge');
  if (badge) {
    badge.textContent = excess.size;
    badge.style.display = excess.size > 0 ? 'inline-block' : 'none';
  }
}

function populateEmpSelect(selectId) {

/* ── 12. LEAVE CODE & BADGE HELPERS ──────────────────────── */

function leaveCode(type) {

    'Annual Leave':'AL','Casual Leave':'CL','Sick Leave':'SL',
    'Half Day Leave':'HD','Short Leave':'SHL','Present':'P'
  };
  return map[type] || type;
}

function leaveBadgeClass(type) {

    'Annual Leave':'badge-blue','Casual Leave':'badge-teal',
    'Sick Leave':'badge-gold','Half Day Leave':'badge-gray','Short Leave':'badge-red'

}

<script>
function pageInit() {
  const s = STATE.settings;
  document.getElementById('set-company').value   = s.company  || '';
  document.getElementById('set-shl-limit').value = s.shlLimit || 1;
  document.getElementById('set-sat-rule').value  = s.satRule  || 0.5;
  renderDeptList();
}

function getDepartments() {
  const d = STATE.settings.departments;
  if (Array.isArray(d) && d.length) return [...d];
  if (typeof d === 'string' && d.trim()) return d.split(',').map(x => x.trim()).filter(Boolean);
  return ['Production'];
}

function renderDeptList() {
  const depts = getDepartments();
  const container = document.getElementById('dept-list');
  if (!container) return;
  container.innerHTML = depts.map((d, i) => `
    <div style="display:inline-flex;align-items:center;gap:6px;background:var(--blue-light);
                border:1px solid #bfdbfe;border-radius:6px;padding:5px 10px;font-size:12px;font-weight:600;color:#1d4ed8">
      ${d}
      <button onclick="removeDepartment(${i})" style="background:none;border:none;cursor:pointer;
              color:#93c5fd;font-size:14px;line-height:1;padding:0 0 0 4px;" title="Remove">×</button>
    </div>`).join('');
}

function addDepartment() {
  const input = document.getElementById('new-dept-input');
  const name  = input.value.trim();
  if (!name) { toast('Enter a department name', 'warning'); return; }
  const depts = getDepartments();
  if (depts.some(d => d.toLowerCase() === name.toLowerCase())) {
    toast('Department already exists', 'warning'); return;
  }
  depts.push(name);
  STATE.settings.departments = depts;
  input.value = '';
  renderDeptList();
  toast(`"${name}" added`, 'success');
}

function removeDepartment(index) {
  const depts = getDepartments();
  const name  = depts[index];
  if (depts.length === 1) { toast('At least one department is required', 'warning'); return; }
  depts.splice(index, 1);
  STATE.settings.departments = depts;
  renderDeptList();
  toast(`"${name}" removed`, 'info');
}

async function saveSettings() {
  STATE.settings.company      = document.getElementById('set-company').value.trim();
  STATE.settings.shlLimit     = parseInt(document.getElementById('set-shl-limit').value);
  STATE.settings.satRule      = parseFloat(document.getElementById('set-sat-rule').value);
  // departments already updated live via addDepartment/removeDepartment
  const payload = {
    company:     STATE.settings.company,
    shlLimit:    STATE.settings.shlLimit,
    satRule:     STATE.settings.satRule,
    departments: getDepartments().join(',')
  };
  try {
    await apiFetch('saveSettings', payload);
    toast('Settings saved!', 'success');
  } catch(e) {
    toast('Saved locally (API not connected)', 'info');
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const pc = document.getElementById('pageContent');
  if (pc) pc.appendChild(document.getElementById('settingsPage'));
});
</script>
