
<style>
  :root {
    --navy: #0f2744; --navy-light: #1a3a6b; --teal: #0d9488; --teal-light: #14b8a6;
    --gold: #d97706; --red: #dc2626; --red-light: #fee2e2; --green: #16a34a;
    --gray-50: #f9fafb; --gray-100: #f3f4f6; --gray-200: #e5e7eb; --gray-300: #d1d5db;
    --gray-400: #9ca3af; --gray-500: #6b7280; --gray-600: #4b5563; --gray-700: #374151;
    --gray-800: #1f2937; --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; color: var(--gray-800); background: transparent; }
  .header-bar {
    display: flex; align-items: center; gap: 14px; padding: 12px 16px;
    background: var(--navy); border-radius: var(--radius) var(--radius) 0 0;
    margin-bottom: 12px;
  }
  .logo-img { height: 48px; width: 80px; object-fit: contain; border-radius: 4px; background: #fff; padding: 3px; }
  .logo-text h2 { font-size: 13px; font-weight: 800; letter-spacing: .08em; color: #fff; text-transform: uppercase; }
  .logo-text p  { font-size: 10px; color: rgba(255,255,255,.5); margin-top: 1px; }
  .toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 0 4px 10px; }
  select, button {
    padding: 6px 10px; border-radius: 6px; border: 1.5px solid var(--gray-200);
    font-size: 12px; font-family: inherit; color: var(--gray-700); background: #fff; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--teal); }
  button { background: var(--teal); color: #fff; border-color: var(--teal); font-weight: 600; }
  button:hover { background: #0b8077; }
  .month-label { font-size: 14px; font-weight: 700; color: var(--navy); margin-left: auto; }
  .legend { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 4px 10px; }
  .leg { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; }
  .leg-AL  { background: #dbeafe; color: #1d4ed8; }
  .leg-CL  { background: #d0faf4; color: var(--teal); }
  .leg-SL  { background: #fce7f3; color: #9d174d; }
  .leg-HD  { background: #fef3c7; color: #92400e; }
  .leg-SHL { background: var(--red-light); color: var(--red); }
  .leg-M   { background: #ede9fe; color: #5b21b6; }
  .leg-P   { background: #fef9c3; color: #713f12; }
  .tbl-wrap { overflow-x: auto; border-radius: 0 0 var(--radius) var(--radius); border: 1px solid var(--gray-200); }
  table { border-collapse: collapse; font-size: 11px; min-width: 800px; width: 100%; }
  th, td { border: 1px solid var(--gray-200); padding: 4px 5px; text-align: center; }
  thead th { background: var(--navy); color: #fff; font-weight: 700; }
  thead th.emp-col { background: var(--navy-light); text-align: left; min-width: 130px; padding-left: 8px; }
  td.emp-name { text-align: left; font-weight: 600; color: var(--navy); background: var(--gray-50); padding-left: 8px; white-space: nowrap; }
  .sub { font-size: 9px; color: var(--gray-400); display: block; font-weight: 400; }
  .code { display: inline-block; padding: 2px 5px; border-radius: 3px; font-size: 10px; font-weight: 700; }
  .code-AL  { background: #dbeafe; color: #1d4ed8; }
  .code-CL  { background: #d0faf4; color: var(--teal); }
  .code-SL  { background: #fce7f3; color: #9d174d; }
  .code-HD  { background: #fef3c7; color: #92400e; }
  .code-SHL { background: var(--red-light); color: var(--red); }
  .day-hol  { background: #fffde7 !important; }
  .day-sat  { background: #f9fafb !important; }
  .day-sun  { background: #f5f5f5 !important; }
  .hol-tip  { font-size: 9px; color: #92400e; font-weight: 600; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 42px; margin: 0 auto; }
  .hol-badge { font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; display: inline-block; }
  .hol-merc  { background: #ede9fe; color: #5b21b6; }
  .hol-poya  { background: #fef3c7; color: #92400e; }
  .hol-company { background: #d0faf4; color: var(--teal); }
  .tooltip-wrap { position: relative; display: inline-block; }
  .tooltip-wrap:hover .tooltip-box { display: block; }
  .tooltip-box { display: none; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--navy); color: #fff; font-size: 10px; padding: 4px 7px; border-radius: 4px; white-space: nowrap; z-index: 10; pointer-events: none; margin-bottom: 3px; }
  .empty { text-align: center; padding: 32px; color: var(--gray-400); font-size: 13px; }
  @media print {
    .toolbar, .legend-bar-wrap button { display: none !important; }
    .tbl-wrap { border: none; }
  }
</style>

<div class="header-bar">
  <img class="logo-img" src="https://raw.githubusercontent.com/barkornamentJaz/Production-Leave/main/images.jpg" alt="Bark Ornament" onerror="this.style.display='none'">
  <div class="logo-text">
    <h2>Bark Ornament</h2>
    <p>Leave Management System</p>
  </div>
</div>

<div class="toolbar">
  <select id="cal-month">
    <option value="01">January</option><option value="02">February</option>
    <option value="03">March</option><option value="04">April</option>
    <option value="05">May</option><option value="06">June</option>
    <option value="07">July</option><option value="08">August</option>
    <option value="09">September</option><option value="10">October</option>
    <option value="11">November</option><option value="12">December</option>
  </select>
  <select id="cal-year">
    <option value="2024">2024</option>
    <option value="2025">2025</option>
    <option value="2026" selected>2026</option>
  </select>
  <select id="cal-emp"></select>
  <button onclick="buildCalendar()">Refresh</button>
  <button onclick="window.print()" style="background:var(--navy);border-color:var(--navy)">Print</button>
  <span class="month-label" id="month-label"></span>
</div>

<div class="legend">
  <span class="leg leg-AL">AL Annual Leave</span>
  <span class="leg leg-CL">CL Casual Leave</span>
  <span class="leg leg-SL">SL Sick Leave</span>
  <span class="leg leg-HD">HD Half Day</span>
  <span class="leg leg-SHL">SHL Short Leave</span>
  <span class="leg leg-M" style="background:#ede9fe;color:#5b21b6">M Mercantile Hol</span>
  <span class="leg leg-P" style="background:#fef9c3;color:#713f12">★ Poya Day</span>
  <span style="font-size:10px;color:var(--gray-400);padding:2px 4px">P = Present · S = Saturday</span>
</div>

<div class="tbl-wrap" id="cal-out"></div>

<script>
const SL_HOLIDAYS = {
  "2025-01-13": { name:"Duruthu Poya", type:"poya" },
  "2025-01-14": { name:"Tamil Thai Pongal Day", type:"merc" },
  "2025-02-04": { name:"National Day", type:"merc" },
  "2025-02-12": { name:"Navam Poya", type:"poya" },
  "2025-03-13": { name:"Medin Poya", type:"poya" },
  "2025-04-12": { name:"Bak Poya", type:"poya" },
  "2025-04-13": { name:"Day before Sinhala & Tamil New Year", type:"merc" },
  "2025-04-14": { name:"Sinhala & Tamil New Year", type:"merc" },
  "2025-04-18": { name:"Good Friday", type:"merc" },
  "2025-05-01": { name:"May Day", type:"merc" },
  "2025-05-12": { name:"Vesak Poya", type:"poya" },
  "2025-05-13": { name:"Day following Vesak", type:"merc" },
  "2025-06-10": { name:"Eid ul Adha", type:"merc" },
  "2025-06-11": { name:"Poson Poya", type:"poya" },
  "2025-07-10": { name:"Esala Poya", type:"poya" },
  "2025-08-09": { name:"Nikini Poya", type:"poya" },
  "2025-09-05": { name:"Milad un Nabi", type:"merc" },
  "2025-09-07": { name:"Binara Poya", type:"poya" },
  "2025-10-02": { name:"Id ul Fitr (makeup)", type:"merc" },
  "2025-10-06": { name:"Vap Poya", type:"poya" },
  "2025-10-20": { name:"Deepavali", type:"merc" },
  "2025-11-05": { name:"Ill Poya", type:"poya" },
  "2025-12-04": { name:"Unduvap Poya", type:"poya" },
  "2025-12-25": { name:"Christmas Day", type:"merc" },
  "2026-01-13": { name:"Duruthu Poya", type:"poya" },
  "2026-01-14": { name:"Tamil Thai Pongal Day", type:"merc" },
  "2026-02-04": { name:"National Day", type:"merc" },
  "2026-02-11": { name:"Navam Poya", type:"poya" },
  "2026-03-02": { name:"Maha Sivarathri", type:"merc" },
  "2026-03-12": { name:"Medin Poya / Ramadan start adj.", type:"poya" },
  "2026-04-02": { name:"Good Friday", type:"merc" },
  "2026-04-11": { name:"Bak Poya", type:"poya" },
  "2026-04-13": { name:"Day before Sinhala & Tamil New Year", type:"merc" },
  "2026-04-14": { name:"Sinhala & Tamil New Year", type:"merc" },
  "2026-05-01": { name:"May Day", type:"merc" },
  "2026-05-11": { name:"Vesak Poya", type:"poya" },
  "2026-05-12": { name:"Day following Vesak", type:"merc" },
  "2026-05-30": { name:"Eid ul Adha", type:"merc" },
  "2026-06-10": { name:"Poson Poya", type:"poya" },
  "2026-07-10": { name:"Esala Poya", type:"poya" },
  "2026-08-08": { name:"Nikini Poya", type:"poya" },
  "2026-09-07": { name:"Binara Poya", type:"poya" },
  "2026-10-06": { name:"Vap Poya", type:"poya" },
  "2026-11-05": { name:"Ill Poya / Deepavali", type:"poya" },
  "2026-12-04": { name:"Unduvap Poya", type:"poya" },
  "2026-12-25": { name:"Christmas Day", type:"merc" }
};

const EMPLOYEES = [
  { id:'E001', name:'Kumara Perera',     dept:'Production' },
  { id:'E002', name:'Nimal Fernando',    dept:'Finishing' },
  { id:'E003', name:'Sumalee Silva',     dept:'Production' },
  { id:'E004', name:'Rohan Wijesinghe',  dept:'Printing' },
  { id:'E005', name:'Kamala Rajapaksa',  dept:'Packaging' },
  { id:'E006', name:'Thilak Bandara',    dept:'Administration' },
  { id:'E007', name:'Priya Herath',      dept:'Finishing' }
];

const now = new Date();
const LEAVE = {};
const yr = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,'0');
const samples = [
  ['E001','Annual Leave', `${yr}-${mo}-03`,`${yr}-${mo}-05`],
  ['E002','Sick Leave',   `${yr}-${mo}-07`,`${yr}-${mo}-07`],
  ['E003','Short Leave',  `${yr}-${mo}-10`,`${yr}-${mo}-10`],
  ['E003','Short Leave',  `${yr}-${mo}-15`,`${yr}-${mo}-15`],
  ['E001','Casual Leave', `${yr}-${mo}-18`,`${yr}-${mo}-18`],
  ['E004','Half Day Leave',`${yr}-${mo}-20`,`${yr}-${mo}-20`],
  ['E005','Annual Leave', `${yr}-${mo}-22`,`${yr}-${mo}-23`]
];
samples.forEach(([empId, type, start, end]) => {
  if (!LEAVE[empId]) LEAVE[empId] = {};
  const s = new Date(start), e = new Date(end);
  for (let d = new Date(s); d <= e; d.setDate(d.getDate()+1)) {
    const ds = d.toISOString().split('T')[0];
    LEAVE[empId][ds] = type;
  }
});

const typeCode = { 'Annual Leave':'AL','Casual Leave':'CL','Sick Leave':'SL','Half Day Leave':'HD','Short Leave':'SHL' };

function ds(d) { return d.toISOString().split('T')[0]; }

function buildCalendar() {
  const month = document.getElementById('cal-month').value;
  const year  = document.getElementById('cal-year').value;
  const empF  = document.getElementById('cal-emp').value;
  const ym = `${year}-${month}`;
  const label = new Date(+year, +month-1, 1).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  document.getElementById('month-label').textContent = label;

  const daysInMonth = new Date(+year, +month, 0).getDate();
  const days = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateS = `${ym}-${String(d).padStart(2,'0')}`;
    const dow = new Date(dateS).getDay();
    const hol = SL_HOLIDAYS[dateS];
    days.push({ d, dateS, dow, isSun: dow===0, isSat: dow===6, hol });
  }

  const emps = empF ? EMPLOYEES.filter(e=>e.id===empF) : EMPLOYEES;

  const DOWL = ['S','M','T','W','T','F','S'];
  const dayHdrs = days.map(({d, dow, isSun, isSat, hol}) => {
    let bg = '';
    if (isSun || hol) bg = 'background:#fffde7;color:#713f12';
    else if (isSat) bg = 'background:#f3f4f6;color:var(--gray-500)';
    const typeLabel = hol ? `<div class="hol-badge ${hol.type==='merc'?'hol-merc':'hol-poya'}">${hol.type==='merc'?'M':'★'}</div>` : '';
    return `<th style="${bg}">${d}<br><span style="font-size:9px;opacity:.7">${DOWL[dow]}</span>${typeLabel}</th>`;
  }).join('');

  const rows = emps.map(emp => {
    const cells = days.map(({dateS, isSun, isSat, hol}) => {
      const lv = LEAVE[emp.id] && LEAVE[emp.id][dateS];
      if (lv) {
        const code = typeCode[lv] || lv;
        return `<td><span class="code code-${code}">${code}</span></td>`;
      }
      if (isSun || hol) {
        const tipText = hol ? hol.name : 'Sunday';
        const holCls = hol ? (hol.type==='merc'?'hol-merc':'hol-poya') : '';
        return `<td class="day-hol"><div class="tooltip-wrap"><span class="hol-badge ${holCls}">${hol?(hol.type==='merc'?'M':'★'):'☀'}</span><span class="tooltip-box">${tipText}</span></div></td>`;
      }
      if (isSat) return `<td class="day-sat"><span style="font-size:10px;color:var(--gray-300)">S</span></td>`;
      return `<td><span style="font-size:10px;color:var(--gray-400)">P</span></td>`;
    }).join('');
    return `<tr>
      <td class="emp-name">${emp.name}<span class="sub">${emp.dept}</span></td>
      ${cells}
    </tr>`;
  }).join('');

  document.getElementById('cal-out').innerHTML = emps.length === 0
    ? `<div class="empty">No employees found</div>`
    : `<table>
        <thead><tr><th class="emp-col">Employee</th>${dayHdrs}</tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
}

const calMonth = document.getElementById('cal-month');
const calYear  = document.getElementById('cal-year');
calMonth.value = String(now.getMonth()+1).padStart(2,'0');
calYear.value  = String(now.getFullYear());
calMonth.onchange = buildCalendar;
calYear.onchange  = buildCalendar;

const empSel = document.getElementById('cal-emp');
empSel.innerHTML = '<option value="">All Employees</option>' +
  EMPLOYEES.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
empSel.onchange = buildCalendar;

buildCalendar();
</script>
